version: "3.8"

# ============================================================
#  Bookzilla — Production Docker Compose
#  - No local Postgres / Redis / RabbitMQ (use managed cloud)
#  - Images pulled from GitHub Container Registry (GHCR)
#  - Caddy handles SSL + reverse proxy (replaces Nginx gateway)
#
#  Before running:
#    export GITHUB_USERNAME=your-github-username
#    docker compose -f docker-compose.prod.yml up -d
# ============================================================

x-service-defaults: &service-defaults
  restart: unless-stopped
  env_file:
    - .env.production
  networks:
    - bookzilla-network
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:

  # ----------------------------------------------------------
  # CADDY — Reverse Proxy + Auto SSL (replaces Nginx gateway)
  # ----------------------------------------------------------
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp" # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - bookzilla-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ----------------------------------------------------------
  # API GATEWAY — Port 3000
  # ----------------------------------------------------------
  api-gateway:
    <<: *service-defaults
    image: ghcr.io/${GITHUB_USERNAME}/bookzilla-api-gateway:latest
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      PORT: 3000
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ----------------------------------------------------------
  # AUTH SERVICE — Port 3001
  # ----------------------------------------------------------
  auth-service:
    <<: *service-defaults
    image: ghcr.io/${GITHUB_USERNAME}/bookzilla-auth-service:latest
    expose:
      - "3001"
    environment:
      NODE_ENV: production
      PORT: 3001
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ----------------------------------------------------------
  # CATALOG SERVICE — Port 3002
  # ----------------------------------------------------------
  catalog-service:
    <<: *service-defaults
    image: ghcr.io/${GITHUB_USERNAME}/bookzilla-catalog-service:latest
    expose:
      - "3002"
    environment:
      NODE_ENV: production
      PORT: 3002
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3002/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ----------------------------------------------------------
  # CART SERVICE — Port 3003
  # ----------------------------------------------------------
  cart-service:
