# ----------------------------------------------------------
# VOLUMES
# ----------------------------------------------------------
volumes:
  caddy_data:    # SSL certificates — persists across restarts
  caddy_config:  # Caddy internal config

# ----------------------------------------------------------
# NETWORKS
# ----------------------------------------------------------
networks:
  bookzilla-network:
    driver: bridge
